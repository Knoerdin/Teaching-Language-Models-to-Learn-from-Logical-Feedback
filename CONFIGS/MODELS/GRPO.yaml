name: grpo

# Model and tokenizer identifiers. Replace with your actual base model.
model_name_or_path: "gpt2"
tokenizer_name_or_path: null

training:
  learning_rate: 5.0e-6
  batch_size: 2
  num_generations: 2
  max_steps: 100
  logging_steps: 10

reward:
  type: "logical_feedback"
  normalize: true
