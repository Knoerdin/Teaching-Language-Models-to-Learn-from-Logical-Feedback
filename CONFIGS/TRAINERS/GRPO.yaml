output_dir: outputs
seed: 42
device: mps

mlflow:
  enabled: true
  tracking_uri: null
  experiment_name: null
  run_name: null
  artifact_subdir: reward_plots
  plot_every_n_steps: 10

trainer_cls:
  _target_: trl.GRPOTrainer

args:
  _target_: trl.GRPOConfig
  learning_rate: 5.0e-6
  per_device_train_batch_size: 2
  generation_batch_size: 2
  num_generations: 2
  max_steps: 100
  logging_steps: 10
  report_to: none
