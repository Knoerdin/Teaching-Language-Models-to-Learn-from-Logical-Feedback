kind: sft
output_dir: outputs/sft
seed: 42
device: auto

terminal:
  show_dataset_progress: false

mlflow:
  enabled: true
  disable_traces: true
  tracking_uri: null
  experiment_name: null
  run_name: null

args:
  learning_rate: 2.0e-5
  per_device_train_batch_size: 4
  max_steps: 500
  logging_steps: 10
  save_steps: 100
  eval_strategy: steps
  eval_steps: 100
  max_length: 2048
  completion_only_loss: true
  packing: false
  gradient_checkpointing: true
  report_to: none
