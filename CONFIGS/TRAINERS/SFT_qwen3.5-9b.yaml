kind: sft
output_dir: outputs/sft_qwen3.5-9b
seed: 42
device: auto

terminal:
  show_dataset_progress: false

peft:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

trainer_cls:
  _target_: trl.SFTTrainer

args:
  _target_: trl.SFTConfig
  learning_rate: 2.0e-5
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_steps: 3000
  logging_steps: 10
  save_steps: 500
  eval_strategy: steps
  eval_steps: 500
  max_length: 2048
  completion_only_loss: true
  packing: false
  gradient_checkpointing: true
  bf16: true
  report_to: none
