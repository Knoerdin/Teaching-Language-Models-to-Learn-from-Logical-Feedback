kind: sft
output_dir: outputs/sft_test
seed: 42
device: auto

terminal:
  show_dataset_progress: false

trainer_cls:
  _target_: trl.SFTTrainer

args:
  _target_: trl.SFTConfig
  learning_rate: 2.0e-5
  per_device_train_batch_size: 1
  max_steps: 3
  logging_steps: 1
  save_steps: 3
  eval_strategy: "no"
  max_length: 1024
  completion_only_loss: true
  packing: false
  gradient_checkpointing: false
  report_to: none
