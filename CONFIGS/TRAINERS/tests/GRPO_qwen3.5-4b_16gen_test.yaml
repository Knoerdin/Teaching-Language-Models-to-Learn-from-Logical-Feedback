kind: grpo
output_dir: outputs/grpo_qwen3.5-4b_16gen_test
seed: 42
device: auto

mlflow:
  enabled: true
  disable_traces: true
  tracking_uri: null
  experiment_name: null
  run_name: null
  artifact_subdir: reward_plots
  plot_every_n_steps: 1

terminal:
  print_autoformalizations: true
  print_autoformalizations_every_n_steps: 1
  max_autoformalizations: 1
  max_autoformalization_chars: 2000
  show_dataset_progress: false

args:
  learning_rate: 1.0e-6
  per_device_train_batch_size: 1
  generation_batch_size: 16
  num_generations: 16
  max_completion_length: 192
  repetition_penalty: 1.1
  max_steps: 100
  logging_steps: 1
  report_to: none
